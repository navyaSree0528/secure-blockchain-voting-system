<!DOCTYPE html>
<html>
<head>

<title>Cast Vote</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">Secure Voting System</span>

<a href="/dashboard" class="btn btn-outline-light">Dashboard</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Cast Your Vote</h2>

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-4">

<form method="POST" action="/submit_vote">

<div class="form-check mb-3">

<input class="form-check-input" type="radio" name="candidate" value="Alice" required>

<label class="form-check-label">Alice</label>

</div>

<div class="form-check mb-3">

<input class="form-check-input" type="radio" name="candidate" value="Bob">

<label class="form-check-label">Bob</label>

</div>

<button class="btn btn-primary w-100">Submit Vote</button>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
