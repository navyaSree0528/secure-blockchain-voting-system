<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">Admin Panel</span>

<a href="/logout" class="btn btn-danger">Logout</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-5">Election Administration Dashboard</h2>

<div class="row">

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h4>Total Votes Recorded</h4>

<h1>{{ votes }}</h1>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h4>Total Blocks</h4>

<h1>{{ blocks }}</h1>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h4>Total Registered Voters</h4>

<h1>{{ voters }}</h1>

</div>

</div>

</div>

<div class="text-center mt-5">

<a href="/admin/open_election" class="btn btn-success me-2">Open Election</a>

<a href="/admin/close_election" class="btn btn-danger me-2">Close Election</a>

<a href="/admin/results" class="btn btn-primary me-2">View Results</a>

<a href="/admin/verify_chain" class="btn btn-dark me-2">Verify Blockchain</a>

<a href="/admin/export_blockchain" class="btn btn-secondary">Download Blockchain</a>

</div>

</div>

</body>
</html>
