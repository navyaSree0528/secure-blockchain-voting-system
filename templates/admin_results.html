<!DOCTYPE html>
<html>

<head>

<title>Election Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">Election Results</span>

<a href="/admin/dashboard" class="btn btn-outline-light">Dashboard</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Vote Count</h2>

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>Candidate</th>

<th>Total Votes</th>

</tr>

</thead>

<tbody>

{% for candidate, votes in count.items() %}

<tr>

<td>{{ candidate }}</td>

<td>{{ votes }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
