<!DOCTYPE html>
<html>
<head>

<title>Election Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">Secure Voting System</span>

<a href="/dashboard" class="btn btn-outline-light">Dashboard</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center">Election Results</h2>

<div class="row mt-4">

<div class="col-md-6">

<h4>Vote Count</h4>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>Candidate</th>
<th>Total Votes</th>

</tr>

</thead>

<tbody>

{% for candidate, votes in count.items() %}

<tr>

<td>{{ candidate }}</td>
<td>{{ votes }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

<div class="col-md-6">

<h4 class="text-center">Vote Distribution</h4>

<img src="/{{ chart }}" class="img-fluid">

</div>

</div>

</div>

</body>
</html>
