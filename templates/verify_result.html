<!DOCTYPE html>
<html>

<head>

<title>Vote Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Secure Voting System</span>
<a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
</div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-4 text-center">

{% if valid %}

<h3 class="text-success">Vote Verified</h3>

<p>Your vote exists in the blockchain.</p>

<div class="alert alert-success">
Verification Successful
</div>

{% else %}

<h3 class="text-danger">Vote Not Found</h3>

<div class="alert alert-danger">
Invalid verification ID
</div>

{% endif %}

<a href="/verify_vote" class="btn btn-primary mt-3">
Verify Another Vote
</a>

</div>

</div>

</div>

</div>

</body>
</html>
