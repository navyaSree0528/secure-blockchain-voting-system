<!DOCTYPE html>
<html>

<head>

<title>Voting Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
}

.card:hover{
transform:scale(1.04);
transition:0.25s;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">Secure Voting System</span>

<div>

<a href="/logout" class="btn btn-danger">Logout</a>

</div>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-5">Voting Dashboard</h2>

<div class="row">

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h4>Cast Vote</h4>

<p>Submit your vote securely</p>

<a href="/vote" class="btn btn-primary">Vote Now</a>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h4>Verify Vote</h4>

<p>Verify your vote using verification ID</p>

<a href="/verify_vote" class="btn btn-success">Verify</a>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h4>Blockchain Explorer</h4>

<p>View blockchain vote ledger</p>

<a href="/blockchain" class="btn btn-dark">Open Explorer</a>

</div>

</div>

</div>

</div>

</body>
</html>
